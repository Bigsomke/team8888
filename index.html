<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NERO IS HERE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        #bgVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(40%);
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .profile-pic {
            width: 140px;
            height: 110px;
            border: none;
            box-shadow: none;
            margin-bottom: 15px;
            object-fit: cover;
            position: relative;
        }

        h1 { font-size: 2.2rem; letter-spacing: 4px; margin: 5px 0; text-transform: uppercase; position: relative; }
        .discord-link { font-size: 1rem; color: #fff; text-decoration: none; margin-bottom: 5px; display: block; position: relative; }
        .status { font-size: 1rem; color: #888; margin-bottom: 25px; position: relative; }

        .info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            position: relative;
        }

        .info-item { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 0.8rem; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 2px; }

        .value-box {
            background-color: transparent;
            padding: 5px 15px;
            min-height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 1);
        }

        .glitch { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bgVideo">
        <source src="https://4up4.com/uploads/file_2026-03-09_155842.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <audio id="bgAudio" autoplay loop preload="auto">
        <source src="https://4up4.com/uploads/file_2026-03-09_155842.mp4" type="audio/mpeg">
    </audio>

    <img src="https://4up4.com/uploads/file_2026-03-09_150753.png" alt="Profile" class="profile-pic">

    <h1 class="glitch">FUCKED BY NERO</h1>
    <a href="https://discord.gg/gPq2NACkWU" target="_blank" class="discord-link">DISCORD.GG/gPq2NACkWU</a>
    <div class="status">NERO IS HERE</div>

    <div class="info-container">
        <div class="info-item"><span class="info-label">IP ADDRESS</span><div id="ip" class="value-box">Loading...</div></div>
        <div class="info-item"><span class="info-label">LOCATION</span><div id="location" class="value-box">Loading...</div></div>
        <div class="info-item"><span class="info-label">ORGANIZATION</span><div id="org" class="value-box">Loading...</div></div>
        <div class="info-item"><span class="info-label">TIMEZONE</span><div id="timezone" class="value-box">Loading...</div></div>
        <div class="info-item"><span class="info-label">COORDINATES</span><div id="coords" class="value-box">Loading...</div></div>
    </div>

    <script>
        // جلب البيانات فقط
        fetch('https://ipinfo.io/json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('ip').textContent = data.ip;
            document.getElementById('location').textContent = data.city + ", " + data.country;
            document.getElementById('org').textContent = data.org;
            document.getElementById('timezone').textContent = data.timezone;
            document.getElementById('coords').textContent = data.loc;
        });
    </script>
</body>
</html>
